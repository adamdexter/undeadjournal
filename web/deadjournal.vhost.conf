<VirtualHost *:80>
    ServerName ${LJ_SERVERNAME}
    UseCanonicalName Off

    # LJ/BML call Apache2::RequestUtil->request (the mod_perl2 "global request");
    # without this it returns undef (breaks BML rendering + per-request DB handles).
    PerlOptions +GlobalRequest

    # LiveJournal's own DocumentRoot + handlers. (modperl.pl tries to inject these
    # via add_httpd_conf, but that doesn't take effect under mod_perl2, so we set
    # them explicitly here.)
    DocumentRoot /home/lj/htdocs
    DirectoryIndex index.html index.bml

    # Apache::LiveJournal is the request router (maps URLs to BML pages, journals,
    # the /interface/* protocol endpoints, etc.).
    PerlInitHandler Apache::LiveJournal

    # BML renders all *.bml pages (homepage, login, update, ...).
    <Files ~ "\.bml$">
        SetHandler perl-script
        PerlResponseHandler Apache::BML
    </Files>

    <Directory /home/lj/htdocs>
        Options +ExecCGI +IncludesNoExec
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/deadjournal_error.log
    CustomLog ${APACHE_LOG_DIR}/deadjournal_access.log combined
</VirtualHost>
