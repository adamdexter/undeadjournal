# Load + initialize the LiveJournal mod_perl application (server context).
#
# modperl.pl's setup_restart() injects DocumentRoot, "PerlInitHandler
# Apache::LiveJournal", and the BML <Files *.bml> handler into the server config
# itself, and it is mod_perl1/mod_perl2 aware. So this file only needs to set
# LJHOME and require modperl.pl at post-config time.
PerlSetEnv LJHOME /home/lj
PerlPassEnv LJHOME
# ljconfig.pl reads these from the environment; mod_perl only exposes env vars to
# Perl that are explicitly passed. Without this, DB_PASSWORD falls back to the
# default and DB connects fail with "Access denied" in worker requests.
PerlPassEnv DB_PASSWORD
PerlPassEnv LJ_DOMAIN
PerlPassEnv LJ_SITEROOT
PerlPassEnv LJ_SERVERNAME
PerlPassEnv SITE_NAME
PerlPassEnv LJ_SCHEME
PerlPostConfigRequire /home/lj/cgi-bin/modperl.pl

# Drop DB handles inherited from the parent so each prefork child reconnects fresh
# (prevents undef master handles in the journal-rendering path).
PerlChildInitHandler LJ::DeadJournalChildInit
